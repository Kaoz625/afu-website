    <meta name="description" content="All For Uniting Social Club — Brooklyn's community movement. United, Anything Is Possible." />

    <meta property="og:image" content="/images/logo/logo.jpg" />
    <title>All For Uniting Social Club</title>
    <script>
      // Handle GitHub Pages SPA redirect (matches public/404.html)
      (function(l){
        if (l.search[1] === '/') {
          var decoded = l.search.slice(1).split('&').map(function(s){
            return s.replace(/~and~/g, '&');
          });
          window.history.replaceState(null, null,
            l.pathname.slice(0, -1) + decoded[0] +
            (decoded[1] ? '?' + decoded[1] : '') + l.hash
          );
        }
      }(window.location));
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  </head>

    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
